<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <h1>Hi Isaac!</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#" id="logout">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="adminLogin">
            <h2>Admin Login</h2>
            <form id="adminLoginForm">
                <label for="adminPassword">Password:</label>
                <input type="password" id="adminPassword" name="adminPassword" required>
                <button type="submit">Login</button>
            </form>
            <p id="loginError" style="color: red; display: none;">Invalid password. Please try again.</p>
        </section>

        <section id="manageBlogs" style="display: none;">
            <h2>Manage Blogs</h2>
            <button id="addBlog">Add New Blog</button>
            <div id="blogList">
                <!-- Blog entries will be dynamically loaded here -->
            </div>
        </section>

        <section id="managePhotography" style="display: none;">
            <h2>Manage Photography</h2>
            <button id="uploadPhoto">Upload New Photo</button>
            <div id="photoGallery">
                <!-- Photo entries will be dynamically loaded here -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 ZacLab</p>
    </footer>

    <script src="scripts/admin.js"></script>
</body>
</html>
